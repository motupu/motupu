<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Random MP3 Player</title>
  <style>
    body {
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
      background: #111;
      color: white;
      font-family: Arial, sans-serif;
    }

    button {
      padding: 20px 40px;
      font-size: 20px;
      border: none;
      border-radius: 12px;
      cursor: pointer;
      background: #4CAF50;
      color: white;
      transition: 0.3s;
    }

    button:hover {
      background: #45a049;
    }
  </style>
</head>
<body>

<button onclick="playRandom()">Start</button>

<audio id="player"></audio>
<script>
  const songs = [
    "song1.mp3",
    "song2.mp3",
    "song3.mp3",
    "song4.mp3"
  ];

  const rareSongs = ["cont1.mp3", "cont2.mp3"];

  let lastPlayed = null;

  function playRandom() {
    const player = document.getElementById("player");

    let chosenSong;

    // 10% chance for rare songs
    if (Math.random() < 0.1) {
      do {
        const randomIndex = Math.floor(Math.random() * rareSongs.length);
        chosenSong = rareSongs[randomIndex];
      } while (chosenSong === lastPlayed);
    } else {
      do {
        const randomIndex = Math.floor(Math.random() * songs.length);
        chosenSong = songs[randomIndex];
      } while (chosenSong === lastPlayed);
    }

    lastPlayed = chosenSong;

    player.src = chosenSong;
    player.play();
  }
</script>

</body>
</html>
